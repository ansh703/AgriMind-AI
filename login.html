<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriMind AI - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="max-width:400px;margin:80px auto;padding:20px;text-align:center;">
  <h1>🌱 AgriMind AI</h1>

  <input type="email" id="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">

  <input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

  <button id="signup" style="width:100%;padding:10px;margin-top:10px;">
    Sign Up
  </button>

  <button id="login" style="width:100%;padding:10px;margin-top:10px;">
    Login
  </button>

  <p id="message"></p>
</div>

<script type="module" src="auth.js"></script>

</body>
</html>
